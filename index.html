<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WaifuWalls - Anime Wallpapers</title>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0d0d0d;
    color:white;
}
header{
    text-align:center;
    padding:20px;
    background:#111;
    font-size:28px;
    font-weight:bold;
    color:#ff4da6;
}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
    padding:20px;
}
.card{
    background:#1a1a1a;
    border-radius:10px;
    overflow:hidden;
    text-align:center;
    box-shadow:0 0 10px rgba(255,77,166,0.4);
}
.card img{
    width:100%;
    display:block;
}
.card button{
    width:100%;
    padding:10px;
    border:none;
    background:#ff4da6;
    color:white;
    font-size:16px;
}
</style>
</head>
<body>

<header>🌸 WaifuWalls - Anime Wallpapers</header>

<div class="grid">
    <div class="card">
    <img src="gojo.jpg">
    <button>Download</button>
</div>

<div class="card">
    <img src="naruto.jpg">
    <button>Download</button>
</div>

<div class="card">
    <img src="levi.jpg">
    <button>Download</button>
</div>
</div>

</body>
</html>
